# Generate base64 values:
#   echo -n 'YOUR_API_KEY'    | base64
#   echo -n 'YOUR_API_SECRET' | base64
#
# Consider using Sealed Secrets, External Secrets Operator, or Vault
# instead of storing credentials in plain YAML files.
apiVersion: v1
kind: Secret
metadata:
  name: ethiack-beacon-credentials
  namespace: ethiack
  labels:
    app.kubernetes.io/name: ethiack-beacon
type: Opaque
data:
  # Replace with your base64-encoded credentials:
  ETHIACK_API_KEY: REPLACE_WITH_BASE64_API_KEY
  ETHIACK_API_SECRET: REPLACE_WITH_BASE64_API_SECRET
